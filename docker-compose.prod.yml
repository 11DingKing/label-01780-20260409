# 生产环境多节点部署配置
# 使用方式: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --scale backend=3
#
# 架构: Nginx (负载均衡) -> 3x Backend -> MySQL + Redis
# 预期支撑: 10000+ 并发在线

services:
  nginx:
    image: nginx:1.25-alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
    restart: always

  backend:
    deploy:
      replicas: 3
      resources:
        limits:
          cpus: "2.0"
          memory: 1G
    ports: []
    expose:
      - "8080"
    environment:
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_USER: root
      MYSQL_PASSWORD: root
      REDIS_HOST: redis
      REDIS_PORT: 6379
      SERVER_PORT: 8080
      SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE: 30
      SPRING_DATASOURCE_HIKARI_MINIMUM_IDLE: 10
    restart: always

  mysql:
    command: >
      --default-authentication-plugin=mysql_native_password
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --max-connections=500
      --innodb-buffer-pool-size=512M
    restart: always

  redis:
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    restart: always
