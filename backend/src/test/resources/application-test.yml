# 测试环境配置，不依赖真实 MySQL
spring:
  datasource:
    url: jdbc:h2:mem:testdb;MODE=MySQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER_CASE=TRUE
    username: sa
    password:
    driver-class-name: org.h2.Driver

jwt:
  secret: test-secret-at-least-32-characters-long
  expire-seconds: 3600

logging:
  level:
    root: WARN
    com.help.mp: INFO
